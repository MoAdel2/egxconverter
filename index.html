<body>
    <!-- العنصر المخفي لجوجل (مهم) -->
    <div id="google_translate_element"></div>

    <header>
        <div class="container">
            <div class="logo">
                <div class="icon">ec</div>
                <div>
                    <h1 class="notranslate"><span style="font-size: larger;">ℰ</span>ℊ Converter</h1>
                    <p>Quick & easy unit conversions</p>
                </div>
            </div>

            <div class="controls">
                <!-- اللغة المخصصة ← ارفعه بعد الثيم -->
                <div class="language-selector-wrapper">
                    <button class="language-btn" id="currentLangBtn">
                        <span class="lang-flag">🇺🇸</span>
                        <span class="lang-name">English</span>
                    </button>
                    <div class="language-dropdown" id="languageDropdown">
                        <div class="lang-option" data-lang="en"><span class="flag-icon">🇺🇸</span> English</div>
                        <div class="lang-option" data-lang="ar"><span class="flag-icon">🇸🇦</span> العربية</div>
                        <div class="lang-option" data-lang="fr"><span class="flag-icon">🇫🇷</span> Français</div>
                        <div class="lang-option" data-lang="es"><span class="flag-icon">🇪🇸</span> Español</div>
                        <div class="lang-option" data-lang="de"><span class="flag-icon">🇩🇪</span> Deutsch</div>
                        <div class="lang-option" data-lang="it"><span class="flag-icon">🇮🇹</span> Italiano</div>
                        <div class="lang-option" data-lang="pt"><span class="flag-icon">🇵🇹</span> Português</div>
                        <div class="lang-option" data-lang="ru"><span class="flag-icon">🇷🇺</span> Русский</div>
                        <div class="lang-option" data-lang="zh"><span class="flag-icon">🇨🇳</span> 中文</div>
                        <div class="lang-option" data-lang="tr"><span class="flag-icon">🇹🇷</span> Türkçe</div>
                        <div class="lang-option" data-lang="ja"><span class="flag-icon">🇯🇵</span> 日本語</div>
                        <div class="lang-option" data-lang="ko"><span class="flag-icon">🇰🇷</span> 한국어</div>
                    </div>
                </div>

                <div class="theme-toggle">
                    <button id="themeBtn">
                        <span id="themeIcon">☀️</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="categories" id="categories"></div>

        <div class="card">
            <div class="grid">
                <div>
                    <label>From</label>
                    <input type="number" id="inputValue" value="1" oninput="convert()">
                    <select id="fromUnit" onchange="convert()"></select>
                </div>

                <button id="swapBtn" onclick="swapUnits()"></button>

                <div>
                    <label>To</label>
                    <div class="result-box">
                        <div class="result" id="result"></div>
                        <button class="copy-btn" onclick="copyText(this)" title="copy">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>
                    <select id="toUnit" onchange="convert()"></select>
                </div>
                <div id="regUnits"></div>
                <div id="curUnits"></div>
            </div>
        </div>
    </main>

    <footer>
        © 2026 egconverter
    </footer>

    <script src="units.js"></script>
    <script src="currency.js"></script>
    <script src="script.js"></script>
